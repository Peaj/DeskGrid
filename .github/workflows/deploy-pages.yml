name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.compare.outputs.version_changed }}
      current_version: ${{ steps.compare.outputs.current_version }}
      previous_version: ${{ steps.compare.outputs.previous_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare package version
        id: compare
        shell: bash
        run: |
          CURRENT_VERSION=$(python - <<'PY'
          import json
          with open('package.json', 'r', encoding='utf-8') as f:
            print(json.load(f)['version'])
          PY
          )

          PREV_SHA="${{ github.event.before }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ -z "$PREV_SHA" || "$PREV_SHA" == "$ZERO_SHA" ]]; then
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              PREV_SHA="$(git rev-parse HEAD~1)"
            else
              echo "version_changed=true" >> "$GITHUB_OUTPUT"
              echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
              echo "previous_version=none" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          PREVIOUS_VERSION="none"
          if git cat-file -e "$PREV_SHA:package.json" 2>/dev/null; then
            PREVIOUS_VERSION=$(git show "$PREV_SHA:package.json" | python -c "import sys, json; print(json.load(sys.stdin)['version'])")
          fi

          if [[ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: version-check
    if: github.event_name == 'workflow_dispatch' || needs.version-check.outputs.version_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [version-check, build]
    if: github.event_name == 'workflow_dispatch' || needs.version-check.outputs.version_changed == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
